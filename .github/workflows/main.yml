name: Validate JSONs

on: [push, pull_request]

jobs:
  verify-json-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Validate JSON
        uses: docker://orrosenblatt/validate-json-action:latest
        env:
          INPUT_SCHEMA: /0.1-alpha/vinv.json
          INPUT_JSONS: /0.1-alpha/examples/minimum.json, /0.1-alpha/examples/random.json
